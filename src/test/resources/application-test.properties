# ── Datasource (H2 replaces MySQL in tests) ───────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Liquibase — disabled; DDL handled by Hibernate in tests ───────────────────
spring.liquibase.enabled=false

# ── FluxNova engine (mocked in tests) ─────────────────────────────────────────
fluxnova.api.base-url=http://localhost:9999/engine-rest
fluxnova.api.connect-timeout-ms=1000
fluxnova.api.read-timeout-ms=1000

# ── LangChain4J (disabled in tests) ───────────────────────────────────────────
langchain4j.open-ai.chat-model.api-key=test-key
