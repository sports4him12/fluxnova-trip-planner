# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL ─────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/fluxnova_trips?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=changeme
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
# Schema managed by Liquibase — Hibernate must not touch it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Liquibase ─────────────────────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# ── FluxNova ──────────────────────────────────────────────────────────────────
# Default engine-rest path exposed by fluxnova-bpm-spring-boot-starter-rest
fluxnova.api.base-url=http://localhost:8090/engine-rest
fluxnova.api.connect-timeout-ms=5000
fluxnova.api.read-timeout-ms=10000

# ── LangChain4J ───────────────────────────────────────────────────────────────
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY:changeme}
langchain4j.open-ai.chat-model.model-name=gpt-4o
langchain4j.open-ai.chat-model.temperature=0.7
