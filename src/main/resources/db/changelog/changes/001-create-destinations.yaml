databaseChangeLog:
  - changeSet:
      id: 001-create-destinations
      author: fluxnova
      changes:
        - createTable:
            tableName: destinations
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(100)
              - column:
                  name: region
                  type: VARCHAR(100)
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: tags
                  type: VARCHAR(500)

  - changeSet:
      id: 001-create-destination-seasons
      author: fluxnova
      changes:
        - createTable:
            tableName: destination_seasons
            columns:
              - column:
                  name: destination_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: season
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: destination_seasons
            baseColumnNames: destination_id
            referencedTableName: destinations
            referencedColumnNames: id
            constraintName: fk_destination_seasons_destination
            onDelete: CASCADE
